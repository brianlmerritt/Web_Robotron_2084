<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Robotron: 2084 remade with JavaScript">
        <link rel="stylesheet" href="./styles/style.css">
        <title>Web Robotron: 2084</title>
        <script rel="modulepreload" type="module" src="./modules/main.js"></script>
    </head>

    <body>
        <div id="game-container">
            <div id="top-info">
                <div id="score-lives-container">
                    <p id="score"></p>
                    <div id="lives">
                    </div>
                </div>
                <div id="fps-container">
                    <span id="fps-string">FPS: </span>
                    <span id="fps-counter">0</span>
                </div>
            </div>

            <canvas></canvas>

            <div id="start-screen" class="overlay">
                <h1>Web_Robotron_2084</h1>
                <h2>Creator: Breno Ludgero</h2>
                <h3>Contributor: BrianLMerritt</h3>
                
                <div class="start-columns">
                    <div class="start-col">
                        <h4>ENEMIES</h4>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: 0px 0px; background-image: url('./assets/sprites/actors/enemies/grunt.png'); width: 28px; height: 32px;"></div>
                            <span>GRUNT (100)</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: 0px 0px; background-image: url('./assets/sprites/actors/enemies/brain.png'); width: 28px; height: 32px;"></div>
                            <span>BRAIN (500)</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: 0px -9px; background-image: url('./assets/sprites/actors/enemies/hulk.png'); width: 26px; height: 32px;"></div>
                            <span>HULK (UNKILLABLE)</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position-x:-32px; background-image: url('./assets/sprites/actors/enemies/spheroid.png'); width: 32px; height: 32px;"></div>
                            <span>SPHEROID (1000)</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: 0px 0px; background-image: url('./assets/sprites/actors/enemies/enforcer.png'); width: 28px; height: 32px;"></div>
                            <span>ENFORCER (150)</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position-x:-32px; background-image: url('./assets/sprites/actors/enemies/quark.png'); width: 32px; height: 32px;"></div>
                            <span>QUARK (1000)</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: 0px 0px; background-image: url('./assets/sprites/actors/enemies/tank.png'); width: 28px; height: 32px;"></div>
                            <span>TANK (200)</span>
                        </div>
                    </div>
            
                    <div class="start-col">
                        <h4>HUMANS</h4>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: -28px -56px; background-image: url('./assets/sprites/actors/humans/daddy.png'); width: 14px; height: 28px;"></div>
                            <span>DADDY</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: -28px -59px; background-image: url('./assets/sprites/actors/humans/mommy.png'); width: 14px; height: 30px;"></div>
                            <span>MOMMY</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: -24px -48px; background-image: url('./assets/sprites/actors/humans/mikey_alt.png'); width: 12px; height: 24px;"></div>
                            <span>MIKEY</span>
                        </div>
                        <div class="actor-row">
                            <div class="sprite-crop" style="background-position: 0px 0px; background-image: url('./assets/sprites/actors/enemies/prog.png'); width: 28px; height: 32px;"></div>
                            <span>PROG (100)</span>
                        </div>
                    </div>
                </div>

                <div id="start-prompt" class="blink-text">PRESS START OR ENTER TO PLAY</div>
            </div>
            
            <div id="pause-screen" class="overlay" style="display: none; justify-content: center; align-items: center; flex-direction: column;">
                <h1 class="blink-text" style="font-size: 4rem; color: #ff00ff; text-shadow: 2px 2px 0px #00ffff, -2px -2px 0px #ffff00;">PAUSED</h1>
            </div>

            <div id="bottom-info">
                <p id="wave">WAVE 001</p>
            </div>
        </div>
    </body>

</html>
